name: "Release"
on:
  push:
    # take no actions on push to any branch...
    branches-ignore:
      - "**"
    # ... only act on tags
    tags:
      - v1.*
      - v2.*

permissions:
  contents: read

env:
  GO_VERSION: "1.25.7"

jobs:
  quality-gate:
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      # we don't want to release commits that have been pushed and tagged, but not necessarily merged onto main
      - name: Ensure tagged commit is on main
        run: |
          echo "Tag: ${GITHUB_REF##*/}"
          git fetch origin main
          git merge-base --is-ancestor ${GITHUB_REF##*/} origin/main && echo "${GITHUB_REF##*/} is a commit on main!"

      - name: Check unit test results
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be #v1.2.0
        id: unit
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Unit tests"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check container build test results
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be #v1.2.0
        id: container
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This check name is defined as the github action job name (in .github/workflows/testing.yaml)
          checkName: "Container Build Test"
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Quality gate
        if: steps.unit.outputs.conclusion != 'success' || steps.container.outputs.conclusion != 'success'
        run: |
          echo "Unit Test Status: ${STEPS_UNIT_OUTPUTS_CONCLUSION}"
          echo "Integration Test Status: ${STEPS_CONTAINER_OUTPUTS_CONCLUSION}"
          false
        env:
          STEPS_UNIT_OUTPUTS_CONCLUSION: ${{ steps.unit.outputs.conclusion }}
          STEPS_CONTAINER_OUTPUTS_CONCLUSION: ${{ steps.container.outputs.conclusion }}

  release:
    needs: [quality-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # required for goreleaser signs section with cosign
      id-token: write
    steps:
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 #v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore tool cache
        id: tool-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: ${{ github.workspace }}/.tmp
          key: ${{ runner.os }}-tool-${{ hashFiles('Makefile') }}
          lookup-only: true

      - name: Restore go cache
        id: go-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-
          lookup-only: true

      - name: Install tools
        run: make bootstrap-tools

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          username: ${{ secrets.ANCHOREINTEGRATIONSWRITE_DH_USERNAME }}
          password: ${{ secrets.ANCHOREINTEGRATIONSWRITE_DH_PAT }}

      - name: Build & publish release artifacts
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.ANCHOREOPS_GITHUB_INTEGRA_WRITE_TOKEN }}
